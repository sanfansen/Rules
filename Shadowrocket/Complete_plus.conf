# 自版本 2.2.81 (3096) 起支持通过 HTTP/2 协议进行中间人攻击来解密 HTTPS 流量。当在纯文本模式的 [MITM] 字段中使用 h2 = true 命令时表示启用，等同于在 UI 界面开启对应开关

